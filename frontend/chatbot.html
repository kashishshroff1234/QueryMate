<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QueryMate — Ask the Data</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="chatbot.css">
<script src="chart.umd.js"></script>
</head>
<body>

<header class="chat-header">
  <button class="back-btn" aria-label="Back to dashboard" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </button>
  <div class="chat-header-text">
    <h1>Ask QueryMate</h1>
    <p>products · suppliers · orders · inventory</p>
  </div>
</header>

<main class="chat-main">
  <div class="chat-scroll" id="chat-scroll">
    <div class="empty-state" id="empty-state">
      <h2>What do you want to know?</h2>
      <p>Ask in plain English. QueryMate writes and runs the SQL for you, against the live dataset.</p>
      <div class="starter-chips">
        <button class="chip" data-question="What's our total revenue from completed orders?">Total revenue from completed orders</button>
        <button class="chip" data-question="Which products are low on stock right now?">Which products are low on stock?</button>
        <button class="chip" data-question="What's the return rate by product category?">Return rate by category</button>
      </div>
    </div>
  </div>
</main>

<div class="input-bar-wrap">
  <form class="input-bar" id="input-form">
    <input type="text" id="question-input" placeholder="Ask a question about products, orders, inventory..." autocomplete="off" aria-label="Ask a question" />
    <button type="button" class="mic-btn" id="mic-btn" aria-label="Speak your question" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3"/>
      </svg>
    </button>
    <button type="submit" class="send-btn" aria-label="Send question">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </form>
</div>

<script src="chatbot.js"></script>
</body>
</html>
